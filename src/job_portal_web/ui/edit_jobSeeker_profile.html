<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | JobConnect</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/css/edit_jobSeeker_profile.css">

</head>

<body>

{% include "components/header.html" %}

<div class="profile-layout">

    <main class="edit-profile-page">

        <!-- ==========================================
                    PAGE HEADER
        =========================================== -->

        <div class="page-header">

            <h1>Edit Profile</h1>

            <p>
                Update your personal information and professional details.
            </p>

        </div>

        <div class="edit-profile-wrapper">

            <!-- ==========================================
                        LEFT PANEL
            =========================================== -->

            <div class="edit-profile-card">

                <!-- Tabs -->

                <div class="profile-tabs">

                    <button
                        class="tab-btn active"
                        data-tab="personal">

                        <i class="fa-regular fa-user"></i>

                        Personal Information

                    </button>

                    <button
                        class="tab-btn"
                        data-tab="language">

                        <i class="fa-solid fa-language"></i>

                        Languages

                    </button>

                    <button
                        class="tab-btn"
                        data-tab="about">

                        <i class="fa-regular fa-file-lines"></i>

                        About Me

                    </button>

                </div>

                <form id="editProfileForm">

                    <!-- ==========================================
                            PERSONAL INFORMATION
                    =========================================== -->

                    <div
                        class="tab-content active"
                        id="personal">

                        <!-- Row 1 -->

                        <div class="form-row">

                            <div class="form-group">

                                <label for="full_name">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    id="full_name"
                                    name="full_name"
                                    placeholder="John Tan">

                            </div>

                            <div class="form-group">

                                <label for="date_of_birth">

                                    Date of Birth

                                </label>

                                <input
                                    type="date"
                                    id="date_of_birth"
                                    name="date_of_birth">

                            </div>

                        </div>

                        <!-- Row 2 -->

                        <div class="form-row">

                            <div class="form-group">

                                <label for="gender">

                                    Gender

                                </label>

                                <select
                                    id="gender"
                                    name="gender">

                                    <option value="">
                                        Select Gender
                                    </option>

                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Prefer not to say</option>

                                </select>

                            </div>

                            <div class="form-group">

                                <label for="nationality">

                                    Nationality

                                </label>

                                <select
                                    id="nationality"
                                    name="nationality">

                                    <option>
                                        Malaysian
                                    </option>

                                    <option>
                                        Singaporean
                                    </option>

                                    <option>
                                        Indonesian
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- Row 3 -->

                        <div class="form-row">

                            <div class="form-group">

                                <label for="email">

                                    Email Address

                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    placeholder="john@email.com">

                            </div>

                            <div class="form-group">

                                <label for="phone">

                                    Phone Number

                                </label>

                                <input
                                    type="tel"
                                    id="phone"
                                    name="phone"
                                    placeholder="+60 12-3456789">

                            </div>

                        </div>

                        <!-- Row 4 -->

                        <div class="form-group">

                            <label for="location">

                                Current Location

                            </label>

                            <input
                                type="text"
                                id="location"
                                name="location"
                                placeholder="Kuala Lumpur, Malaysia">

                        </div>

                        <!-- Row 5 -->

                        <div class="form-row">

                            <div class="form-group">

                                <label for="current_position">

                                    Current Position

                                </label>

                                <input
                                    type="text"
                                    id="current_position"
                                    name="current_position"
                                    placeholder="Software Engineer">

                            </div>

                            <div class="form-group">

                                <label for="experience_level">

                                    Experience Level

                                </label>

                                <select
                                    id="experience_level"
                                    name="experience_level">

                                    <option>
                                        Fresh Graduate
                                    </option>

                                    <option>
                                        1–2 Years
                                    </option>

                                    <option>
                                        3–5 Years
                                    </option>

                                    <option>
                                        6–10 Years
                                    </option>

                                    <option>
                                        10+ Years
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- Row 6 -->

                        <div class="form-group">

                            <label for="current_company">

                                Current Company

                            </label>

                            <input
                                type="text"
                                id="current_company"
                                name="current_company"
                                placeholder="ABC Technology Sdn. Bhd.">

                        </div>

                    </div>

                    <!-- ==========================================
                            LANGUAGES
                    =========================================== -->

                    <div
                        class="tab-content"
                        id="language">

                        <div class="language-page">

                            <div class="language-header">

                                <div>

                                    <h3>Languages</h3>

                                    <p>
                                        Add the languages you can communicate in and specify your proficiency level.
                                    </p>

                                </div>

                                <button
                                    type="button"
                                    id="openLanguageModal"
                                    class="add-language">

                                    <i class="fa-solid fa-plus"></i>

                                    Add Language

                                </button>

                            </div>

                            <div id="languageContainer">

                                <!-- Empty state will be inserted by JavaScript -->

                            </div>

                        </div>

                    </div>

                    <!-- ==========================================
                            ABOUT ME
                    =========================================== -->

                    <div
                        class="tab-content"
                        id="about">

                        <div class="form-group">

                            <label for="about_me">

                                About Me

                            </label>

                            <textarea
                                id="about_me"
                                name="about_me"
                                rows="12"
                                placeholder="Introduce yourself, describe your background, work experience, skills, achievements, strengths and career goals."></textarea>

                        </div>

                    </div>

                                        <!-- ==========================================
                            FORM BUTTONS
                    =========================================== -->

                    <div class="form-actions">

                        <button
                            type="reset"
                            class="btn-cancel">

                            Cancel

                        </button>

                        <button
                            type="submit"
                            class="btn-save">

                            Save Changes

                        </button>

                    </div>

                </form>

            </div>

            <!-- ==========================================
                    RIGHT SIDEBAR
            =========================================== -->

            <aside class="profile-right-panel">

                <div class="photo-card">

                    <h3>

                        Profile Photo

                    </h3>

                    <div class="photo-container">

                        <img
                            id="profilePreview"
                            src="/images/user.png"
                            alt="Profile Photo">

                        <!-- Camera Button -->

                        <button
                            type="button"
                            class="photo-edit-btn"
                            onclick="document.getElementById('profile_photo').click();">

                            <i class="fa-solid fa-camera"></i>

                        </button>

                    </div>

                    <input
                        type="file"
                        id="profile_photo"
                        accept="image/*"
                        hidden>

                </div>

            </aside>

        </div>

    </main>

</div>

<!-- ==========================================
            LANGUAGE MODAL
========================================== -->

<div
    id="languageModal"
    class="language-modal">

    <div class="language-modal-content">

        <!-- Header -->

        <div class="modal-header">

            <h2>

                Add Language

            </h2>

            <button
                type="button"
                id="closeLanguageModal"
                class="close-modal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <!-- Body -->

        <div class="modal-body">

            <div class="form-group">

                <label for="languageSelect">

                    Language

                </label>

                <select id="languageSelect">

                    <option value="">
                        Select Language
                    </option>

                    <option>English</option>
                    <option>Malay</option>
                    <option>Chinese</option>
                    <option>Tamil</option>
                    <option>Japanese</option>
                    <option>Korean</option>
                    <option>French</option>
                    <option>German</option>
                    <option>Spanish</option>
                    <option>Arabic</option>

                </select>

            </div>

            <div class="form-group">

                <label for="languageLevel">

                    Proficiency

                </label>

                <select id="languageLevel">

                    <option value="">
                        Select Level
                    </option>

                    <option>Native</option>
                    <option>Professional</option>
                    <option>Advanced</option>
                    <option>Intermediate</option>
                    <option>Basic</option>

                </select>

            </div>

        </div>

        <!-- Footer -->

        <div class="modal-footer">

            <button
                type="button"
                id="cancelLanguage"
                class="btn-cancel">

                Cancel

            </button>

            <button
                type="button"
                id="saveLanguage"
                class="btn-save">

                Save

            </button>

        </div>

    </div>

</div>

<!-- ==========================================
        JAVASCRIPT
========================================== -->

<script>
    const tabs = document.querySelectorAll(".tab-btn");
const contents = document.querySelectorAll(".tab-content");

/* ======================================
        TAB SWITCHING
====================================== */

tabs.forEach(tab => {

    tab.addEventListener("click", () => {

        tabs.forEach(btn => btn.classList.remove("active"));

        contents.forEach(content =>
            content.classList.remove("active")
        );

        tab.classList.add("active");

        document
            .getElementById(tab.dataset.tab)
            .classList.add("active");

    });

});

/* ======================================
        PROFILE IMAGE PREVIEW
====================================== */

const photoInput = document.getElementById("profile_photo");
const preview = document.getElementById("profilePreview");

photoInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    // Allowed image types
    const allowedTypes = [
        "image/jpeg",
        "image/jpg",
        "image/png",
        "image/webp"
    ];

    if (!allowedTypes.includes(file.type)) {

        alert("Only JPG, JPEG, PNG and WEBP images are allowed.");

        this.value = "";

        preview.src = "/images/user.png";

        return;
    }

    // Maximum file size (2MB)
    const maxSize = 2 * 1024 * 1024;

    if (file.size > maxSize) {

        alert("Image size must not exceed 2MB.");

        this.value = "";

        preview.src = "/images/user.png";

        return;
    }

    // Preview image
    const reader = new FileReader();

    reader.onload = function (e) {

        preview.src = e.target.result;

    };

    reader.readAsDataURL(file);

});

/* ======================================
        LANGUAGE VARIABLES
====================================== */

const languageModal =
    document.getElementById("languageModal");

const openBtn =
    document.getElementById("openLanguageModal");

const closeBtn =
    document.getElementById("closeLanguageModal");

const cancelBtn =
    document.getElementById("cancelLanguage");

const saveBtn =
    document.getElementById("saveLanguage");

const languageSelect =
    document.getElementById("languageSelect");

const languageLevel =
    document.getElementById("languageLevel");

const languageContainer =
    document.getElementById("languageContainer");

let editCard = null;

/* ======================================
        EMPTY STATE
====================================== */

function updateEmptyState(){

    const cards =
        languageContainer.querySelectorAll(".language-card");

    if(cards.length === 0){

        languageContainer.innerHTML = `

            <div class="language-empty">

                No languages added yet.

            </div>

        `;

    }

}

/* ======================================
        OPEN MODAL
====================================== */

openBtn.addEventListener("click", () => {

    editCard = null;

    languageSelect.value = "";
    languageLevel.value = "";

    languageModal.classList.add("show");

});

/* ======================================
        CLOSE MODAL
====================================== */

function closeModal(){

    languageModal.classList.remove("show");

}

closeBtn.addEventListener("click", closeModal);

cancelBtn.addEventListener("click", closeModal);

window.addEventListener("click", function(e){

    if(e.target === languageModal){

        closeModal();

    }

});

/* ======================================
        SAVE LANGUAGE
====================================== */

saveBtn.addEventListener("click", function(){

    const language = languageSelect.value.trim();
    const level = languageLevel.value.trim();

    if(language === "" || level === ""){

        alert("Please select a language and proficiency.");

        return;

    }

    const cards =
        languageContainer.querySelectorAll(".language-card");

    for(const card of cards){

        if(card !== editCard){

            const existing =
                card.querySelector(".language-name").textContent;

            if(existing === language){

                alert("This language already exists.");

                return;

            }

        }

    }

    if(editCard){

        editCard.querySelector(".language-name").textContent =
            language;

        editCard.querySelector(".language-level").textContent =
            level;

    }

    else{

        if(languageContainer.querySelector(".language-empty")){

            languageContainer.innerHTML = "";

        }

        const card = document.createElement("div");

        card.className = "language-card";

        card.innerHTML = `

            <div class="language-info">

                <div class="language-name">

                    ${language}

                </div>

                <div class="language-level">

                    ${level}

                </div>

            </div>

            <div class="language-actions">

                <button
                    type="button"
                    class="edit-language">

                    <i class="fa-solid fa-pen"></i>

                </button>

                <button
                    type="button"
                    class="delete-language">

                    <i class="fa-solid fa-trash"></i>

                </button>

            </div>

        `;

        languageContainer.appendChild(card);

    }

    registerLanguageEvents();

    closeModal();

});

/* ======================================
        REGISTER EVENTS
====================================== */

function registerLanguageEvents(){

    document
        .querySelectorAll(".edit-language")
        .forEach(button => {

        button.onclick = function(){

            editCard =
                this.closest(".language-card");

            languageSelect.value =
                editCard.querySelector(".language-name").textContent;

            languageLevel.value =
                editCard.querySelector(".language-level").textContent;

            languageModal.classList.add("show");

        };

    });

    document
        .querySelectorAll(".delete-language")
        .forEach(button => {

        button.onclick = function(){

            if(confirm("Delete this language?")){

                this.closest(".language-card").remove();

                updateEmptyState();

            }

        };

    });

}

/* ======================================
        INITIALIZE
====================================== */

updateEmptyState();

registerLanguageEvents();

</script>

</body>

</html>
