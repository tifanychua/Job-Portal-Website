<!DOCTYPE html>
<html>

<head>

<title>My Interviews</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


{% include "components/header.html" %}



<div class="container applicant-container">

<main>


<div class="page-title">

<h1>
My Interviews
</h1>

<p>
View your interview invitations and manage your responses.
</p>

</div>

<section class="filter-card">

<div class="filter-section">


<div>

<label>
Search Interview
</label>

<input 
type="text"
id="searchInterview"
placeholder="Search company, position or interviewer..."
onkeyup="filterInterviews()">

</div>



<div style="margin-left: 100px;">

<label>
Interview Status
</label>

<select 
id="statusFilter"
onchange="filterInterviews()">

<option value="All">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Accepted">
Accepted
</option>

<option value="Declined">
Declined
</option>

<option value="Completed">
Completed
</option>

<option value="Cancelled">
Cancelled
</option>

</select>

</div>


</div>

</section>


<section id="interviewList" class="interview-list">


</section>



</main>


</div>




{% include "components/footer.html" %}





<script>


let interviewList = [];



function loadInterviews(){


fetch(`/api/applicant/interviews?application_id={{ application_id }}`)

.then(res=>res.json())


.then(data=>{


let container = document.getElementById(
"interviewList"
);



if(data.error){

container.innerHTML = `

<div class="empty-state">

<h3>
${data.error}
</h3>

</div>

`;

return;

}



interviewList = data;


filterInterviews();



})


.catch(error=>{


console.log(error);


document.getElementById("interviewList").innerHTML = `


<div class="empty-state">

<h3>
Failed to load interviews
</h3>

<p>
Please try again later.
</p>

</div>


`;

});


}






function filterInterviews(){


let keyword = document
.getElementById("searchInterview")
.value
.toLowerCase();



let status = document
.getElementById("statusFilter")
.value;





let filtered = interviewList.filter(interview=>{


let searchMatch =

(interview.companyName || "")
.toLowerCase()
.includes(keyword)


||


(interview.position || "")
.toLowerCase()
.includes(keyword)


||


(interview.interviewer || "")
.toLowerCase()
.includes(keyword);





let statusMatch =

status === "All"

||

interview.status === status;



return searchMatch && statusMatch;



});



displayInterviews(filtered);



}








function displayInterviews(data){


let container = document.getElementById(
"interviewList"
);



container.innerHTML = "";





if(data.length === 0){


container.innerHTML = `


<div class="empty-state">

<h3>
No Interview Invitation
</h3>

<p>
No interview matches your search.
</p>

</div>


`;

return;


}





data.forEach(interview=>{


let statusClass = "";


if(interview.status){

statusClass = interview.status
.toLowerCase()
.replaceAll(" ","-");

}





container.innerHTML += `


<div class="interview-card">



<div class="interview-card-header">


<div>


<h2>

${interview.companyName || "Company"}

</h2>


<h3>

${interview.position || "Position"}

</h3>


</div>




<span class="${statusClass}">

${interview.status}

</span>



</div>






<div class="interview-info">


<div>

<strong>
Date
</strong>


<p>

${interview.date}

</p>


</div>




<div>

<strong>
Time
</strong>


<p>

${interview.time}

</p>


</div>





<div>

<strong>
Interview Type
</strong>


<p>

${interview.interviewType}

</p>


</div>





<div>

<strong>
Interviewer
</strong>


<p>

${interview.interviewer}

</p>


</div>



</div>







<div class="action-buttons">


<a href="/my_interviews/detail/${interview.id}">


<button class="primary">

View Details

</button>


</a>



</div>



</div>



`;



});


}





loadInterviews();


</script>




</body>

</html>
